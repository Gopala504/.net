<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mythra</title>
    <link rel="stylesheet" href="/Web/css/Day2/home.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .login-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007BFF;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background-color: #0056b3;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
        }

        .register-link a {
            color: #007BFF;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: red;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div id="logo">
            <img src="/Web/Assets/logo.jpg" alt="logo">
        </div>
        <nav>
            <a href="/Web/html/Day2/home.html">Home</a>
            <a href="/Web/html/Day2/mithra.html">Mens</a>
            <a href="/Web/html/Day2/womens.html">Womens</a>
            <a href="/Web/html/Day2/kids.html">Kids</a>
            <a href="#">Beauty</a>
            <a href="#">Genz</a>
            <a href="#">Studio</a>
            <input type="search" placeholder="search here">
            <div id="profile-container">
                <a href="#" id="login">Profile</a>
                <div id="profile-menu">
                    <button id="login-btn">Login</button>
                    <button id="register-btn">Register</button>
                </div>
            </div>
            <a href="#">Wishlist</a>
            <a href="#">Bag</a>
        </nav>
    </header>

    <div class="login-container">
        <h1>Login</h1>
        <div id="error-message" class="error-message"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="/Web/html/Day2/register.html">Register here</a>
        </div>
    </div>

    <script>
        const profileContainer = document.getElementById('profile-container');
        const profileMenu = document.getElementById('profile-menu');
        
        profileContainer.addEventListener('mouseenter', function() {
            profileMenu.style.display = 'block';
        });
        
        profileContainer.addEventListener('mouseleave', function() {
            profileMenu.style.display = 'none';
        });
        
        document.getElementById('login-btn').addEventListener('click', function() {
            window.location.href = '/Web/html/Day2/login.html';
        });
        
        document.getElementById('register-btn').addEventListener('click', function() {
            window.location.href = '/Web/html/Day2/register.html';
        });

        // Handle login form submission
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            // Clear message
            errorMsg.textContent = '';
            errorMsg.style.display = 'none';

            if (!email || !password) {
                errorMsg.textContent = 'Email and password are required!';
                errorMsg.style.display = 'block';
                return;
            }

            // Get registered users from localStorage
            let registeredUsers = JSON.parse(localStorage.getItem('registeredUsers')) || [];

            // Check if user exists and password matches
            const user = registeredUsers.find(u => u.email === email);

            if (!user) {
                errorMsg.textContent = 'Email not found! Please register first.';
                errorMsg.style.display = 'block';
                return;
            }

            if (user.password !== password) {
                errorMsg.textContent = 'Incorrect password! Please try again.';
                errorMsg.style.display = 'block';
                return;
            }

            // Login successful - store logged in user
            localStorage.setItem('user', JSON.stringify({
                fullname: user.fullname,
                email: user.email,
                phone: user.phone,
                address: user.address,
                isLoggedIn: true
            }));

            // Redirect to profile page
            window.location.href = '/Web/html/Day2/profile.html';
        });
    </script>
</body>
</html>
