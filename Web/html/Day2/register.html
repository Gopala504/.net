<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Mythra</title>
    <link rel="stylesheet" href="/Web/css/Day2/home.css">
    <style>
        .register-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .register-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007BFF;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }

        .register-btn {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .register-btn:hover {
            background-color: #0056b3;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #007BFF;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div id="logo">
            <img src="/Web/Assets/logo.jpg" alt="logo">
        </div>
        <nav>
            <a href="/Web/html/Day2/home.html">Home</a>
            <a href="/Web/html/Day2/mithra.html">Mens</a>
            <a href="/Web/html/Day2/womens.html">Womens</a>
            <a href="/Web/html/Day2/kids.html">Kids</a>
            <a href="#">Beauty</a>
            <a href="#">Genz</a>
            <a href="#">Studio</a>
            <input type="search" placeholder="search here">
            <div id="profile-container">
                <a href="#" id="login">Profile</a>
                <div id="profile-menu">
                    <button id="login-btn">Login</button>
                    <button id="register-btn">Register</button>
                </div>
            </div>
            <a href="#">Wishlist</a>
            <a href="#">Bag</a>
        </nav>
    </header>

    <div class="register-container">
        <h1>Create Account</h1>
        <div id="error-message" class="error-message" style="color: red; display: none;"></div>
        <div id="success-message" style="color: green; text-align: center; margin-bottom: 20px; display: none;"></div>
        <form id="register-form">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>

            <button type="submit" class="register-btn">Register</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/Web/html/Day2/login.html">Login here</a>
        </div>
    </div>

    <script>
        const profileContainer = document.getElementById('profile-container');
        const profileMenu = document.getElementById('profile-menu');
        
        profileContainer.addEventListener('mouseenter', function() {
            profileMenu.style.display = 'block';
        });
        
        profileContainer.addEventListener('mouseleave', function() {
            profileMenu.style.display = 'none';
        });
        
        document.getElementById('login-btn').addEventListener('click', function() {
            window.location.href = '/Web/html/Day2/login.html';
        });
        
        document.getElementById('register-btn').addEventListener('click', function() {
            window.location.href = '/Web/html/Day2/register.html';
        });

        // Handle registration form submission
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');

            // Clear messages
            errorMsg.textContent = '';
            successMsg.textContent = '';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Validation
            if (!fullname || !email || !phone || !address || !password || !confirmPassword) {
                errorMsg.textContent = 'All fields are required!';
                errorMsg.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match!';
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters long!';
                errorMsg.style.display = 'block';
                return;
            }

            // Get registered users from localStorage
            let registeredUsers = JSON.parse(localStorage.getItem('registeredUsers')) || [];

            // Check if email already exists
            const emailExists = registeredUsers.some(user => user.email === email);
            if (emailExists) {
                errorMsg.textContent = 'This email is already registered! Please login or use a different email.';
                errorMsg.style.display = 'block';
                return;
            }

            // Add new user
            registeredUsers.push({
                fullname: fullname,
                email: email,
                phone: phone,
                address: address,
                password: password
            });

            // Save to localStorage
            localStorage.setItem('registeredUsers', JSON.stringify(registeredUsers));

            // Show success message
            successMsg.textContent = 'Registration successful! Redirecting to login page...';
            successMsg.style.display = 'block';

            // Redirect to login page after 2 seconds
            setTimeout(() => {
                window.location.href = '/Web/html/Day2/login.html';
            }, 2000);
        });
    </script>
</body>
</html>
