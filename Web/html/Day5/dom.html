<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/Web/css/Day5/dom.css">
</head>
<body>
    <h1>profile</h1>
    <div class="profile" id="profile"> </div>
    <div id="Container"></div>
    <button onclick="addBox()">click here</button>
   <script>

        let profile = document.getElementById("profile")
        function addProfile(){
            let existingBox = document.querySelector(".box");
            if(existingBox){
                existingBox.remove()
            } else {
                let newBox = document.createElement("div");
                newBox.className = "box";
                newBox.innerHTML = "<p><b>Welcome<b> <br> To access the details of student</p> <br> <button class=login-btn>Login/Signup</button> <br> <hr> <ul><li>Name</li><li>contact Details</li><li>score secured</li><li>Badges</li></ul> <hr> <ul><li>Rank</li><li> Details</li><li> address</li></ul>"
                document.getElementById("Container").appendChild(newBox);
            }
        }
        profile.addEventListener("click", addProfile)
    
</script>
</body>
</html>
