<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/Web/css/Day3/AdminDash.css">
</head>
<body>

    <div class="dashboard">

        <aside class="sidebar">
            <h2>Admin Panel</h2>

            <div class="nav-buttons">
                <button>Dashboard</button>
                <button>Users</button>
                <button>Reports</button>
                <button>Settings</button>
            </div>
        </aside>

        <main class="main-content">
            <h1>Dashboard Overview</h1>

            <div class="cards">
                <div class="card">
                    <h3>Total Users</h3>
                    <p>1,250</p>
                </div>

                <div class="card">
                    <h3>Revenue</h3>
                    <p>₹75,000</p>
                </div>

                <div class="card">
                    <h3>Orders</h3>
                    <p>320</p>
                </div>

                <div class="card">
                    <h3>Pending Tasks</h3>
                    <p>12</p>
                </div>
            </div>

        </main>

    </div>

</body>
</html>
