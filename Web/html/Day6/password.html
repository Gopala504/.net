<!DOCTYPE html>
<html>
<head>
    <title>Live Registration Form</title>
</head>
<body>

<h2>Registration Form</h2>

<label>Name:</label><br>
<input type="text" id="name" onchange="validateName()">
<p id="nameMsg"></p>

<label>Email:</label><br>
<input type="text" id="email" onchange="validateEmail()">
<p id="emailMsg"></p>

<label>Age:</label><br>
<input type="number" id="age" onchange="validateAge()">
<p id="ageMsg"></p>

<br>
<button onclick="submitForm()">Submit</button>

<h3 id="finalMsg"></h3>

<script>

function validateName() {
    let name = document.getElementById("name").value;

    if (name === "") {
        document.getElementById("nameMsg").innerText = "Name cannot be empty";
        document.getElementById("nameMsg").style.color = "red";
    } else {
        document.getElementById("nameMsg").innerText = "Valid Name";
        document.getElementById("nameMsg").style.color = "green";
    }
}

function validateEmail() {
    let email = document.getElementById("email").value;

    if (!email.includes("@")) {
        document.getElementById("emailMsg").innerText = "Email must contain @";
        document.getElementById("emailMsg").style.color = "red";
    } else {
        document.getElementById("emailMsg").innerText = "Valid Email";
        document.getElementById("emailMsg").style.color = "green";
    }
}

function validateAge() {
    let age = document.getElementById("age").value;

    if (age <= 18) {
        document.getElementById("ageMsg").innerText = "Age must be greater than 18";
        document.getElementById("ageMsg").style.color = "red";
    } else {
        document.getElementById("ageMsg").innerText = "Valid Age";
        document.getElementById("ageMsg").style.color = "green";
    }
}

function submitForm() {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let age = document.getElementById("age").value;

    if (name !== "" && email.includes("@") && age > 18) {

        sessionStorage.setItem("user-name", name);
        sessionStorage.setItem("user-email", email);
        sessionStorage.setItem("user-age", age);

        document.getElementById("finalMsg").innerText = "Registration Successful";
        document.getElementById("finalMsg").style.color = "green";

    } else {

        document.getElementById("finalMsg").innerText = "Please fix errors before submitting";
        document.getElementById("finalMsg").style.color = "red";
    }
}

</script>

</body>
</html>
