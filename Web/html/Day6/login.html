<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="/Web/css/Day6/login.css">
</head>
<body>
    
    <form id="loginForm" action="#" method="post">
        <h2>Login</h2>
        <label for="loginUsername">Username:</label><br>
        <input type="text" id="loginUsername" name="username" required><br><br>

        <label for="loginPassword">Password:</label><br>
        <input type="password" id="loginPassword" name="password" required><br><br>

        <button type="submit">Login</button>
        <p id="loginError" style="color: red;"></p>
        <p>Don't have an account? <a href="/Web/html/Day6/signup.html">Sign Up</a></p>
    </form>

    <script src="/Web/js/Day6/login.js"></script>
</body>
</html>
